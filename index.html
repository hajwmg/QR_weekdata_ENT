<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mega Medical | Clinical Information</title>

  <meta name="description" content="메가메디칼 ENT Clinical Information" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mega Medical | Clinical Information" />
  <meta property="og:description" content="제품 설명 자료를 모바일에서 바로 확인하세요." />

  <style>
    :root{
      --bg:#f6f3ef;
      --card:#ffffff;
      --text:#111111;
      --sub:#666666;
      --line:#e8e2dc;
      --brand:#f07a3c;
      --brand-dark:#d96527;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:
        radial-gradient(circle at top right, rgba(240,122,60,.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(240,122,60,.08), transparent 24%),
        var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
      color:var(--text);
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      padding:34px 24px 24px;
      text-align:center;
      box-shadow:0 18px 40px rgba(0,0,0,.08);
    }

    .brand{
      font-size:13px;
      font-weight:800;
      letter-spacing:.18em;
      color:var(--brand);
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1.15;
      letter-spacing:-.04em;
    }

    p{
      margin:14px 0 0;
      font-size:15px;
      color:var(--sub);
      line-height:1.6;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:58px;
      margin-top:24px;
      border-radius:18px;
      background:var(--brand);
      color:#fff;
      font-size:17px;
      font-weight:800;
      text-decoration:none;
      transition:.2s ease;
      box-shadow:0 10px 24px rgba(240,122,60,.22);
    }

    .btn:hover{
      background:var(--brand-dark);
      transform:translateY(-1px);
    }

    .sub-link{
      display:inline-block;
      margin-top:14px;
      font-size:14px;
      color:var(--sub);
      text-decoration:none;
      border-bottom:1px solid #cfc7c0;
      padding-bottom:2px;
    }

    .hint{
      margin-top:22px;
      font-size:12px;
      color:#8a8179;
    }

    @media (max-width:480px){
      .card{
        padding:30px 20px 22px;
        border-radius:24px;
      }
      h1{
        font-size:26px;
      }
      .btn{
        min-height:56px;
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">MEGA MEDICAL</div>
    <h1>ENT Clinical Information</h1>
    <p>
      메가메디칼 제품 설명 자료를<br>
      모바일에서 바로 확인하실 수 있습니다.
    </p>

    <a class="btn" href="./메가메디칼_제품설명회_260313.pdf" target="_blank" rel="noopener">
      PDF 바로보기
    </a>

    <a class="sub-link" href="./메가메디칼_제품설명회_260313.pdf" download>
      PDF 다운로드
    </a>

    <div class="hint">
      Tap to open the product brochure
    </div>
  </main>
</body>
</html>
